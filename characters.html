<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Characters · Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Caveat:wght@400;500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --ink:#091425;
  --amber:#146BFF;
  --amber-light:#FFD34E;
  --cream:#F7FBFF;
  --shadow:rgba(20,10,0,0.55);
}

body{
  font-family:'Crimson Text',Georgia,serif;
  background:#050914;
  color:var(--cream);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HERO ── */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding-bottom:4rem;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:url('cover.png') center/cover no-repeat;
  filter:brightness(0.72);
  transform:scale(1.03);
  animation:slowzoom 22s ease-in-out infinite alternate;
}

@keyframes slowzoom{
  from{transform:scale(1.03)}
  to{transform:scale(1.09)}
}

/* warm vignette that feels like the painting itself */
.hero-vignette{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(10,5,0,0.82) 0%, transparent 70%),
    radial-gradient(ellipse 100% 40% at 50% 0%,   rgba(10,5,0,0.45) 0%, transparent 70%);
  pointer-events:none;
}

.hero-content{
  position:relative;
  text-align:center;
  z-index:2;
  padding:0 1.5rem;
}

.tagline{
  font-family:'Caveat',cursive;
  font-size:clamp(1rem,2.5vw,1.3rem);
  color:var(--amber-light);
  letter-spacing:0.08em;
  margin-bottom:1rem;
  opacity:0;
  animation:fadeup 0.9s 0.3s ease forwards;
}

.site-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-weight:300;
  font-size:clamp(3.5rem,9vw,7rem);
  color:var(--cream);
  line-height:1;
  letter-spacing:0.02em;
  opacity:0;
  animation:fadeup 0.9s 0.55s ease forwards;
  text-shadow:0 4px 32px rgba(0,0,0,0.6);
}

.site-sub{
  font-family:'Crimson Text',Georgia,serif;
  font-size:clamp(0.9rem,2vw,1.1rem);
  color:rgba(247,251,255,0.65);
  letter-spacing:0.18em;
  text-transform:uppercase;
  margin-top:0.7rem;
  opacity:0;
  animation:fadeup 0.9s 0.75s ease forwards;
}

.hero-cta{
  display:inline-block;
  margin-top:2.5rem;
  padding:0.75rem 2.5rem;
  border:1px solid rgba(20,107,255,0.6);
  color:var(--amber-light);
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-size:1.15rem;
  letter-spacing:0.06em;
  text-decoration:none;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(4px);
  cursor:pointer;
  transition:background 0.25s,border-color 0.25s,color 0.25s;
  opacity:0;
  animation:fadeup 0.9s 1s ease forwards;
}
.hero-cta:hover{
  background:rgba(20,107,255,0.18);
  border-color:var(--amber-light);
  color:#fff;
}

@keyframes fadeup{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── POSTER QUOTE ── */
.poster{
  text-align:center;
  padding:3.5rem 1.5rem 3rem;
  background:#050914;
  position:relative;
}
.poster::before{
  content:'';
  display:block;
  width:1px;
  height:40px;
  background:rgba(20,107,255,0.3);
  margin:0 auto 2rem;
}
.poster-text{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-size:clamp(1.1rem,2.5vw,1.5rem);
  color:rgba(247,251,255,0.55);
  max-width:520px;
  margin:0 auto;
  line-height:1.7;
}
.poster-attr{
  font-family:'Caveat',cursive;
  font-size:0.95rem;
  color:rgba(20,107,255,0.55);
  margin-top:1rem;
}

/* ── EPISODES SECTION ── */
.episodes-section{
  background:#050914;
  padding:0 clamp(1.2rem,6vw,5rem) 5rem;
}

.section-head{
  text-align:center;
  padding-bottom:2.5rem;
  border-bottom:1px solid rgba(20,107,255,0.15);
  margin-bottom:2.5rem;
}

.section-head h2{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-weight:300;
  font-size:clamp(1.6rem,3.5vw,2.4rem);
  color:var(--cream);
  letter-spacing:0.04em;
}

.section-head p{
  font-size:0.92rem;
  color:rgba(247,251,255,0.4);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-top:0.4rem;
}

/* episode list — simple lines, no grid */
.ep-list{
  max-width:680px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:0;
}

.ep-item{
  display:flex;
  align-items:baseline;
  gap:1.5rem;
  padding:1.1rem 0;
  border-bottom:1px solid rgba(247,251,255,0.07);
  cursor:pointer;
  transition:background 0.2s;
  border-radius:2px;
}
.ep-item:hover{
  background:rgba(20,107,255,0.05);
  padding-left:0.5rem;
  padding-right:0.5rem;
}

.ep-num{
  font-family:'Caveat',cursive;
  font-size:1rem;
  color:var(--amber);
  min-width:2.8rem;
  flex-shrink:0;
}

.ep-meta{
  flex:1;
  min-width:0;
}

.ep-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:1.18rem;
  font-weight:400;
  color:var(--cream);
  line-height:1.3;
}

.ep-part{
  font-size:0.82rem;
  color:rgba(247,251,255,0.38);
  letter-spacing:0.06em;
  margin-top:0.2rem;
}

.ep-arrow{
  color:rgba(20,107,255,0.4);
  font-size:1rem;
  flex-shrink:0;
  transition:transform 0.2s,color 0.2s;
}
.ep-item:hover .ep-arrow{
  transform:translateX(4px);
  color:var(--amber);
}

/* empty state */
.ep-empty{
  text-align:center;
  padding:3rem 1rem;
  color:rgba(247,251,255,0.25);
  font-style:italic;
  font-size:1rem;
}



/* ── CHARACTERS SECTION ── */
.hero-actions{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;align-items:center}
.hero-cta.secondary{background:rgba(247,251,255,0.06);border-color:rgba(247,251,255,0.22);color:rgba(247,251,255,0.78)}
.hero-cta.secondary:hover{background:rgba(20,107,255,0.12);border-color:var(--amber-light);color:#fff}
.characters-section{background:#050914;padding:0 clamp(1.2rem,6vw,5rem) 5rem}
.character-grid{max-width:980px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,170px);gap:0.9rem;justify-content:center;align-items:start}
.character-card{width:170px;background:rgba(247,251,255,0.035);border:1px solid rgba(20,107,255,0.16);padding:0.65rem;cursor:pointer;transition:transform .2s,background .2s,border-color .2s;overflow:hidden}
.character-card:hover{transform:translateY(-3px);background:rgba(20,107,255,0.055);border-color:rgba(20,107,255,0.32)}
.character-thumb{width:100%;height:125px;border:1px solid rgba(20,107,255,0.18);background:rgba(247,251,255,0.04);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:0.55rem;color:rgba(247,251,255,0.32);font-family:'Caveat',cursive;font-size:0.9rem;text-align:center;padding:0.55rem}
.character-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.character-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.02rem;font-weight:300;color:var(--cream);font-style:italic;line-height:1.08;margin-bottom:0.18rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.character-role{font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(20,107,255,0.72);margin-bottom:0.28rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.character-preview{font-size:0.76rem;line-height:1.25;color:rgba(247,251,255,0.48);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.character-modal{display:none;position:fixed;inset:0;background:rgba(8,4,1,0.96);z-index:550;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.character-modal.open{display:flex}
.character-modal-card{width:min(940px,96vw);max-height:92vh;overflow:auto;background:#07101f;border:1px solid rgba(20,107,255,0.28);box-shadow:0 25px 90px rgba(0,0,0,.5);padding:1.1rem}
.character-modal-top{display:flex;justify-content:space-between;align-items:center;gap:1rem;border-bottom:1px solid rgba(20,107,255,0.16);padding-bottom:0.8rem;margin-bottom:1rem}
.character-modal-top h2{font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;font-size:clamp(1.5rem,4vw,2.2rem)}
.character-modal-close{background:none;border:1px solid rgba(20,107,255,0.35);color:var(--amber-light);padding:0.35rem 0.8rem;font-family:'Caveat',cursive;font-size:1rem;cursor:pointer}
.character-modal-body{display:grid;grid-template-columns:minmax(220px,360px) 1fr;gap:1.3rem;align-items:start}
.character-modal-image{border:1px solid rgba(20,107,255,0.18);background:rgba(247,251,255,0.04);min-height:260px;display:flex;align-items:center;justify-content:center;color:rgba(247,251,255,0.32);font-family:'Caveat',cursive;font-size:1.1rem;text-align:center;padding:1rem}
.character-modal-image img{width:100%;height:auto;display:block}
.character-modal-text{white-space:pre-wrap;font-size:1.05rem;line-height:1.75;color:rgba(247,251,255,0.72)}
@media(max-width:720px){.character-modal-body{grid-template-columns:1fr}.hero-actions{flex-direction:column}.hero-cta{width:min(280px,92vw)}.character-grid{grid-template-columns:repeat(auto-fill,150px);gap:.75rem}.character-card{width:150px}.character-thumb{height:110px}}

/* ══ STUDIO CHOICE + CHARACTER MANAGEMENT ══ */
.studio-choice{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
.choice-card{background:rgba(247,251,255,0.035);border:1px solid rgba(20,107,255,0.18);padding:1.5rem;cursor:pointer;transition:background .2s,border-color .2s,transform .2s;text-align:left;color:var(--cream)}
.choice-card:hover{background:rgba(20,107,255,0.07);border-color:rgba(20,107,255,0.42);transform:translateY(-2px)}
.choice-card h2{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:300;font-size:1.5rem;margin-bottom:.35rem}
.choice-card p{font-size:.9rem;color:rgba(247,251,255,.4);line-height:1.45}
.studio-tab{display:none}.studio-tab.active{display:block}
.back-choice{background:none;border:none;color:rgba(247,251,255,.35);font-family:'Crimson Text',Georgia,serif;font-size:.95rem;cursor:pointer;margin-bottom:1rem}.back-choice:hover{color:var(--amber-light)}
.s-textarea{width:100%;min-height:150px;resize:vertical;background:rgba(247,251,255,0.05);border:1px solid rgba(20,107,255,0.2);color:var(--cream);font-family:'Crimson Text',Georgia,serif;font-size:1rem;padding:.7rem .8rem;outline:none;transition:border-color .2s}.s-textarea:focus{border-color:var(--amber)}
.studio-actions{display:flex;gap:.65rem;flex-wrap:wrap;align-items:center}.s-submit.ghost{background:transparent;color:rgba(247,251,255,.42);border-color:rgba(247,251,255,.14)}.s-submit.ghost:hover{background:rgba(247,251,255,.06);color:var(--cream)}
.manage-actions{display:flex;gap:.45rem;flex-shrink:0}.manage-edit{background:none;border:1px solid rgba(20,107,255,.28);color:rgba(255,211,78,.85);font-size:.78rem;padding:.2rem .6rem;cursor:pointer;font-family:'Crimson Text',serif}.manage-edit:hover{background:rgba(20,107,255,.12);color:#fff}
@media(max-width:600px){.studio-choice{grid-template-columns:1fr}.manage-item{align-items:flex-start;flex-wrap:wrap}.manage-actions{width:100%;justify-content:flex-end}}

/* ── FOOTER ── */
footer{
  text-align:center;
  padding:2rem 1rem;
  border-top:1px solid rgba(247,251,255,0.07);
  color:rgba(247,251,255,0.2);
  font-size:0.8rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  background:#050914;
}

/* ══ PDF READER OVERLAY ══ */
.reader-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(20,107,255,0.13), transparent 60%),
    linear-gradient(180deg, rgba(13,8,5,0.98), rgba(8,4,1,0.98));
  z-index:500;
  flex-direction:column;
  height:100dvh;
  overflow:hidden;
}
.reader-overlay.open{display:flex}

.reader-topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  padding:0.75rem clamp(0.8rem,3vw,1.5rem);
  border-bottom:1px solid rgba(20,107,255,0.2);
  background:rgba(13,8,5,0.86);
  backdrop-filter:blur(10px);
  flex-shrink:0;
}

.reader-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-size:clamp(1rem,4vw,1.25rem);
  color:var(--cream);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.reader-close{
  background:rgba(20,107,255,0.08);
  border:1px solid rgba(20,107,255,0.35);
  color:var(--amber-light);
  font-family:'Caveat',cursive;
  font-size:1rem;
  padding:0.45rem 0.75rem;
  cursor:pointer;
  transition:background 0.2s,border-color 0.2s,color 0.2s;
  border-radius:999px;
  min-height:38px;
  flex-shrink:0;
}
.reader-close:hover{background:rgba(20,107,255,0.18);border-color:var(--amber-light);color:#fff}

.reader-stage{
  position:relative;
  flex:1;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:1.2rem 0 3.2rem;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.reader-paper{
  width:min(94vw,920px);
  min-height:55vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

#pdfCanvas{
  display:block;
  max-width:100%;
  height:auto;
  background:#f8f1e8;
  box-shadow:0 20px 70px rgba(0,0,0,0.55),0 0 0 1px rgba(20,107,255,0.18);
  border-radius:10px;
}

.reader-loading{
  position:absolute;
  inset:auto 1rem 50%;
  transform:translateY(50%);
  text-align:center;
  color:rgba(247,251,255,0.55);
  font-family:'Caveat',cursive;
  font-size:1.15rem;
  pointer-events:none;
}

.reader-hint-floating{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  font-size:0.75rem;
  color:rgba(247,251,255,0.32);
  letter-spacing:0.08em;
  font-family:'Crimson Text',Georgia,serif;
  pointer-events:none;
  user-select:none;
  opacity:0.9;
  transition:opacity 1s ease;
  text-align:center;
  width:max-content;
  max-width:92vw;
}

@media(max-width:640px){
  .reader-topbar{padding:0.65rem 0.75rem}
  .reader-stage{padding:0.8rem 0 3.4rem}
  .reader-paper{width:96vw}
  #pdfCanvas{border-radius:6px}
}

/* ══ STUDIO PASSWORD GATE ══ */
.studio-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(8,4,1,0.97);
  z-index:600;
  align-items:center;
  justify-content:center;
}
.studio-overlay.open{display:flex}

.studio-box{
  background:#07101f;
  border:1px solid rgba(20,107,255,0.25);
  padding:2.5rem 2.5rem 2rem;
  width:min(420px,92vw);
}

.studio-box h2{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-weight:300;
  font-size:1.8rem;
  color:var(--cream);
  margin-bottom:0.3rem;
}

.studio-box p{
  font-size:0.85rem;
  color:rgba(247,251,255,0.35);
  letter-spacing:0.08em;
  text-transform:uppercase;
  margin-bottom:2rem;
}

.studio-field{
  width:100%;
  background:rgba(247,251,255,0.05);
  border:1px solid rgba(20,107,255,0.25);
  color:var(--cream);
  font-family:'Crimson Text',Georgia,serif;
  font-size:1.05rem;
  padding:0.65rem 1rem;
  outline:none;
  margin-bottom:1rem;
  transition:border-color 0.2s;
}
.studio-field:focus{border-color:var(--amber)}

.studio-btn{
  width:100%;
  background:rgba(20,107,255,0.18);
  border:1px solid rgba(20,107,255,0.5);
  color:var(--amber-light);
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-size:1.1rem;
  padding:0.65rem;
  cursor:pointer;
  transition:background 0.2s;
}
.studio-btn:hover{background:rgba(20,107,255,0.32)}

.studio-err{
  font-size:0.85rem;
  color:#c0614a;
  margin-top:0.6rem;
  min-height:1.2rem;
}

.studio-cancel{
  background:none;
  border:none;
  color:rgba(247,251,255,0.25);
  font-family:'Crimson Text',Georgia,serif;
  font-size:0.9rem;
  cursor:pointer;
  margin-top:1.2rem;
  display:block;
  text-align:center;
  width:100%;
  transition:color 0.2s;
}
.studio-cancel:hover{color:rgba(247,251,255,0.55)}

/* ══ STUDIO PANEL ══ */
.studio-panel{
  display:none;
  position:fixed;
  inset:0;
  background:#050914;
  z-index:600;
  overflow-y:auto;
  flex-direction:column;
}
.studio-panel.open{display:flex}

.studio-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1rem 1.5rem;
  border-bottom:1px solid rgba(20,107,255,0.2);
  flex-shrink:0;
}

.studio-header h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-weight:300;
  font-size:1.5rem;
  color:var(--cream);
}

.studio-exit{
  background:none;
  border:1px solid rgba(20,107,255,0.3);
  color:var(--amber-light);
  font-family:'Caveat',cursive;
  font-size:0.95rem;
  padding:0.3rem 1rem;
  cursor:pointer;
  transition:background 0.2s;
}
.studio-exit:hover{background:rgba(20,107,255,0.12)}

.studio-body{
  padding:2rem clamp(1rem,5vw,3rem);
  max-width:700px;
  width:100%;
  margin:0 auto;
  flex:1;
}

.studio-section-title{
  font-family:'Caveat',cursive;
  font-size:1.05rem;
  color:var(--amber);
  margin-bottom:1.2rem;
  letter-spacing:0.04em;
}

/* Upload form */
.upload-form{
  background:rgba(247,251,255,0.03);
  border:1px solid rgba(20,107,255,0.18);
  padding:1.8rem;
  margin-bottom:2.5rem;
}

.form-row{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:0.8rem;
  margin-bottom:0.8rem;
}

@media(max-width:500px){.form-row{grid-template-columns:1fr}}

.s-label{
  font-size:0.78rem;
  color:rgba(247,251,255,0.4);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-bottom:0.3rem;
  display:block;
}

.s-input{
  width:100%;
  background:rgba(247,251,255,0.05);
  border:1px solid rgba(20,107,255,0.2);
  color:var(--cream);
  font-family:'Crimson Text',Georgia,serif;
  font-size:1rem;
  padding:0.5rem 0.8rem;
  outline:none;
  transition:border-color 0.2s;
}
.s-input:focus{border-color:var(--amber)}

.file-drop{
  border:1px dashed rgba(20,107,255,0.3);
  padding:1.5rem;
  text-align:center;
  cursor:pointer;
  margin-bottom:0.8rem;
  transition:background 0.2s,border-color 0.2s;
  position:relative;
}
.file-drop:hover,.file-drop.drag{
  background:rgba(20,107,255,0.06);
  border-color:var(--amber);
}
.file-drop input[type=file]{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
  width:100%;
  height:100%;
}
.file-drop-text{
  font-family:'Caveat',cursive;
  font-size:1.05rem;
  color:rgba(247,251,255,0.4);
  pointer-events:none;
}
.file-name{
  font-size:0.85rem;
  color:var(--amber);
  margin-top:0.4rem;
  min-height:1.1rem;
}

.s-submit{
  background:rgba(20,107,255,0.18);
  border:1px solid rgba(20,107,255,0.4);
  color:var(--amber-light);
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  font-size:1.05rem;
  padding:0.6rem 2rem;
  cursor:pointer;
  transition:background 0.2s;
}
.s-submit:hover{background:rgba(20,107,255,0.3)}

.form-msg{
  font-size:0.85rem;
  margin-top:0.7rem;
  min-height:1.1rem;
  color:var(--amber-light);
}

/* Manage episodes list */
.manage-list{
  display:flex;
  flex-direction:column;
  gap:0.5rem;
}

.manage-item{
  display:flex;
  align-items:center;
  gap:1rem;
  padding:0.8rem 1rem;
  background:rgba(247,251,255,0.03);
  border:1px solid rgba(20,107,255,0.12);
}

.manage-num{
  font-family:'Caveat',cursive;
  font-size:1rem;
  color:var(--amber);
  min-width:2.5rem;
}

.manage-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:1.05rem;
  color:var(--cream);
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.manage-del{
  background:none;
  border:1px solid rgba(180,70,50,0.3);
  color:rgba(200,100,80,0.7);
  font-size:0.78rem;
  padding:0.2rem 0.6rem;
  cursor:pointer;
  font-family:'Crimson Text',serif;
  transition:background 0.2s,color 0.2s;
  flex-shrink:0;
}
.manage-del:hover{background:rgba(180,70,50,0.12);color:#e08070}

.manage-empty{
  color:rgba(247,251,255,0.2);
  font-style:italic;
  font-size:0.95rem;
  padding:1rem 0;
}

/* hidden studio trigger (click logo 5x) */

.characters-page-hero{min-height:46vh;position:relative;display:flex;align-items:flex-end;justify-content:center;text-align:center;padding:6rem 1.5rem 4rem;overflow:hidden;background:#050914}
.characters-page-hero::before{content:'';position:absolute;inset:0;background:url('cover.png') center/cover no-repeat;filter:brightness(.45);transform:scale(1.04)}
.characters-page-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 50% 100%,rgba(13,8,5,.95),transparent 70%),linear-gradient(180deg,rgba(13,8,5,.2),#050914)}
.characters-page-content{position:relative;z-index:2}
.back-home{display:inline-block;margin-bottom:1.2rem;color:rgba(255,211,78,.8);text-decoration:none;border:1px solid rgba(20,107,255,.35);padding:.45rem 1rem;font-family:'Caveat',cursive;font-size:1rem;background:rgba(0,0,0,.2)}
.back-home:hover{background:rgba(20,107,255,.14);color:#fff}
</style>
</head>
<body>
<section class="characters-page-hero">
  <div class="characters-page-content">
    <a class="back-home" href="index.html">← Back to Splash</a>
    <span class="tagline" style="opacity:1;animation:none">faces · fragments · backgrounds</span>
    <h1 class="site-title" style="opacity:1;animation:none">Characters Revealed</h1>
    <p class="site-sub" style="opacity:1;animation:none">The Splash of Lives</p>
  </div>
</section>

<section class="characters-section" id="characters">
  <div class="section-head">
    <h2>Meet the Characters</h2>
    <p>Click a card to expand the full art and lore</p>
  </div>
  <div class="character-grid" id="characterGrid">
    <div class="ep-empty">No characters revealed yet.</div>
  </div>
</section>

<footer><span>Splash &nbsp;·&nbsp; Characters</span></footer>

<div class="character-modal" id="characterModal">
  <div class="character-modal-card">
    <div class="character-modal-top">
      <div>
        <h2 id="characterModalName">—</h2>
        <p class="character-role" id="characterModalRole"></p>
      </div>
      <button class="character-modal-close" onclick="closeCharacterModal()">✕ Close</button>
    </div>
    <div class="character-modal-body">
      <div class="character-modal-image" id="characterModalImage">Image not available</div>
      <div class="character-modal-text" id="characterModalText">Nothing written.</div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://cpqbukdclkaubkvylzzh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwcWJ1a2RjbGthdWJrdnlsenpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Mzg3NjcsImV4cCI6MjA5NDMxNDc2N30.DqEt3DK-ZLrz1S8jcWiGbxjesTpcXBHeuJaiMuAhOlE';
const CHARACTERS_TABLE = 'characters';
const CHARACTER_BUCKET = 'character-art';
const SUPABASE_READY = SUPABASE_URL.startsWith('https://') && SUPABASE_ANON_KEY.length > 40;
const supabase = SUPABASE_READY ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let characters = [];

async function loadCharactersFromSupabase(){
  if(!SUPABASE_READY){ characters=[]; renderCharactersPublic(); return; }
  const { data, error } = await supabase
    .from(CHARACTERS_TABLE)
    .select('id,name,role,lore,image_path,sort_order,is_visible,created_at')
    .eq('is_visible', true)
    .order('sort_order', { ascending:true })
    .order('created_at', { ascending:true });
  if(error){ console.error(error); characters=[]; renderCharactersPublic(); return; }
  characters = data || [];
  renderCharactersPublic();
}

function getCharacterImageUrl(character){
  if(!character || !character.image_path || !SUPABASE_READY) return '';
  const { data } = supabase.storage.from(CHARACTER_BUCKET).getPublicUrl(character.image_path);
  return data.publicUrl;
}

function renderCharactersPublic(){
  const grid = document.getElementById('characterGrid');
  const visible = characters.filter(c => (c.image_path && c.image_path.trim()) || (c.lore && c.lore.trim()));
  if(!visible.length){
    grid.innerHTML = '<div class="ep-empty">No characters revealed yet.</div>';
    return;
  }
  grid.innerHTML = visible.map(c=>{
    const imgUrl = getCharacterImageUrl(c);
    const lore = (c.lore || '').trim();
    return `
      <div class="character-card" onclick="openCharacterModal('${escAttr(c.id)}')">
        <div class="character-thumb">${imgUrl ? `<img src="${escAttr(imgUrl)}" alt="${escAttr(c.name || 'Character art')}">` : 'Image not available'}</div>
        <h3 class="character-name">${esc(c.name || 'Unnamed Character')}</h3>
        ${c.role ? `<div class="character-role">${esc(c.role)}</div>` : ''}
        <p class="character-preview">${lore ? esc(lore) : 'Nothing written.'}</p>
      </div>`;
  }).join('');
}

function openCharacterModal(id){
  const c = characters.find(x=>x.id===id);
  if(!c) return;
  const imgUrl = getCharacterImageUrl(c);
  document.getElementById('characterModalName').textContent = c.name || 'Unnamed Character';
  document.getElementById('characterModalRole').textContent = c.role || '';
  document.getElementById('characterModalImage').innerHTML = imgUrl ? `<img src="${escAttr(imgUrl)}" alt="${escAttr(c.name || 'Character art')}">` : 'Image not available';
  document.getElementById('characterModalText').textContent = (c.lore && c.lore.trim()) ? c.lore : 'Nothing written.';
  document.getElementById('characterModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeCharacterModal(){
  document.getElementById('characterModal').classList.remove('open');
  document.body.style.overflow='';
}

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return esc(s).replace(/'/g,'&#39;'); }

window.openCharacterModal = openCharacterModal;
window.closeCharacterModal = closeCharacterModal;
loadCharactersFromSupabase();
</script>
</body>
</html>
